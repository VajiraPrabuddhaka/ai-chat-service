apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: ai-chat-service
  namespace: default
spec:
  owner:
    projectName: default
  autoDeploy: true
  componentType:
    kind: ClusterComponentType
    name: deployment/service
  workflow:
    kind: ClusterWorkflow
    name: dockerfile-builder
    parameters:
      repository:
        url: "https://github.com/VajiraPrabuddhaka/ai-chat-service"
        revision:
          branch: "main"
        appPath: "/"
      docker:
        context: "/"
        filePath: "/Dockerfile"
  traits:
    - kind: ClusterTrait
      name: groq-ai-gateway
      instanceName: llm
      parameters:
        model: llama-3.3-70b-versatile
        apiKeyRef: openai-api-key

---

apiVersion: openchoreo.dev/v1alpha1
kind: WorkflowRun
metadata:
  name: ai-chat-service-build-01
  namespace: default
  labels:
    openchoreo.dev/project: "default"
    openchoreo.dev/component: "ai-chat-service"
spec:
  workflow:
    kind: ClusterWorkflow
    name: dockerfile-builder
    parameters:
      repository:
        url: "https://github.com/VajiraPrabuddhaka/ai-chat-service"
        revision:
          branch: "main"
        appPath: "/"
      docker:
        context: "/"
        filePath: "/Dockerfile"

---

apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: ai-chat-service-workload
  namespace: default
spec:
  owner:
    projectName: default
    componentName: ai-chat-service
  endpoints:
    http:
      type: HTTP
      port: 8080
      visibility: [external]
  container:
    image: "ai-chat-service:latest"
    command:
      - /ai-chat-service
    args:
      - --port
      - "8080"
    env:
      - key: LOG_LEVEL
        value: "info"
      - key: OPENAI_MODEL
        value: "llama-3.3-70b-versatile"